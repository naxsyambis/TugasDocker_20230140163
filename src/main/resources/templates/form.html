<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Form Input</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Segoe UI", sans-serif;
		}

		body {
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: linear-gradient(135deg, #dfeee3, #c9dfcf, #edf6ef);
			padding: 20px;
		}

		.container {
			width: 100%;
			max-width: 450px;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			padding: 35px;
			box-shadow: 0 12px 35px rgba(93, 122, 102, 0.18);
			border: 1px solid rgba(174, 198, 180, 0.4);
		}

		.header {
			text-align: center;
			margin-bottom: 25px;
		}

		.header .icon {
			width: 60px;
			height: 60px;
			margin: 0 auto 14px;
			border-radius: 50%;
			background: linear-gradient(135deg, #8faa91, #b8ccb9);
			display: flex;
			justify-content: center;
			align-items: center;
			color: white;
			font-size: 24px;
			box-shadow: 0 6px 18px rgba(143, 170, 145, 0.35);
		}

		.header h3 {
			color: #4f6d57;
			font-size: 22px;
			margin-bottom: 6px;
		}

		.header p {
			font-size: 13px;
			color: #7b8f80;
		}

		.form-group {
			margin-bottom: 18px;
		}

		label {
			display: block;
			margin-bottom: 6px;
			color: #5d7362;
			font-size: 14px;
			font-weight: 600;
		}

		input[type="text"] {
			width: 100%;
			padding: 12px 14px;
			border: 1px solid #d4e1d7;
			border-radius: 12px;
			background-color: #f7fbf8;
			font-size: 14px;
			color: #4f5f53;
			transition: all 0.25s ease;
		}

		input:focus {
			outline: none;
			border-color: #8faa91;
			background-color: #ffffff;
			box-shadow: 0 0 0 4px rgba(143, 170, 145, 0.15);
		}

		.radio-group {
			display: flex;
			gap: 20px;
			margin-top: 8px;
		}

		.radio-group label {
			font-weight: normal;
			color: #4f5f53;
			cursor: pointer;
		}

		.radio-group input {
			margin-right: 6px;
		}

		.actions {
			margin-top: 20px;
		}

		button {
			width: 100%;
			padding: 13px;
			border: none;
			border-radius: 14px;
			background: linear-gradient(135deg, #8faa91, #6f8f75);
			color: white;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			box-shadow: 0 8px 18px rgba(111, 143, 117, 0.25);
			transition: all 0.25s ease;
		}

		button:hover {
			transform: translateY(-2px);
			background: linear-gradient(135deg, #7f9f86, #5f7d65);
			box-shadow: 0 12px 22px rgba(111, 143, 117, 0.35);
		}

		.back {
			display: block;
			text-align: center;
			margin-top: 14px;
			color: #6f8f75;
			text-decoration: none;
			font-size: 14px;
			font-weight: 600;
		}

		.back:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>

<div class="container">

	<div class="header">
		<div class="icon">🌱</div>
		<h3>Form Mahasiswa</h3>
		<p>Masukkan data dengan lengkap</p>
	</div>

	<form action="/save" method="post">

		<div class="form-group">
			<label>Nama</label>
			<input type="text" name="nama" placeholder="Masukkan nama" required>
		</div>

		<div class="form-group">
			<label>NIM</label>
			<input type="text" name="nim" placeholder="Masukkan NIM" required>
		</div>

		<div class="form-group">
			<label>Jenis Kelamin</label>
			<div class="radio-group">
				<label>
					<input type="radio" name="jenisKelamin" value="Laki-laki"> Laki-laki
				</label>
				<label>
					<input type="radio" name="jenisKelamin" value="Perempuan"> Perempuan
				</label>
			</div>
		</div>

		<div class="actions">
			<button type="submit">Simpan Data</button>
		</div>

	</form>

	<a href="/home" class="back">← Kembali ke Home</a>

</div>

</body>
</html>
