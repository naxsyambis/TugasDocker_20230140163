<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Home</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Segoe UI", sans-serif;
		}

		body {
			min-height: 100vh;
			background: linear-gradient(135deg, #dfeee3, #c9dfcf, #edf6ef);
			padding: 30px;
		}

		.container {
			max-width: 900px;
			margin: auto;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			padding: 30px;
			box-shadow: 0 12px 35px rgba(93, 122, 102, 0.18);
			border: 1px solid rgba(174, 198, 180, 0.4);
		}

		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 25px;
		}

		.title {
			color: #4f6d57;
		}

		.title h3 {
			font-size: 22px;
			margin-bottom: 4px;
		}

		.title p {
			font-size: 14px;
			color: #7b8f80;
		}

		.logout {
			text-decoration: none;
			color: #6f8f75;
			font-weight: 600;
			font-size: 14px;
		}

		.logout:hover {
			text-decoration: underline;
		}

		.btn {
			display: inline-block;
			margin: 10px 0 20px 0;
			padding: 12px 18px;
			border-radius: 14px;
			background: linear-gradient(135deg, #8faa91, #6f8f75);
			color: white;
			text-decoration: none;
			font-weight: 600;
			font-size: 14px;
			box-shadow: 0 8px 18px rgba(111, 143, 117, 0.25);
			transition: all 0.25s ease;
		}

		.btn:hover {
			transform: translateY(-2px);
			background: linear-gradient(135deg, #7f9f86, #5f7d65);
			box-shadow: 0 12px 22px rgba(111, 143, 117, 0.35);
		}

		h4 {
			color: #4f6d57;
			margin-bottom: 10px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			overflow: hidden;
			border-radius: 16px;
		}

		thead {
			background: linear-gradient(135deg, #8faa91, #6f8f75);
			color: white;
		}

		th {
			padding: 14px;
			font-size: 14px;
		}

		td {
			padding: 12px;
			text-align: center;
			background-color: #f7fbf8;
			border-bottom: 1px solid #e3efe7;
			color: #4f5f53;
		}

		tr:last-child td {
			border-bottom: none;
		}

		tbody tr:hover td {
			background-color: #eef6f0;
		}

		.empty {
			padding: 20px;
			color: #8b9d8f;
		}
	</style>
</head>

<body>

<div class="container">

	<div class="header">
		<div class="title">
			<h3> Website Friska 20230140163</h3>
			<p>Selamat datang di aplikasi</p>
		</div>

		<a href="/" class="logout">Logout</a>
	</div>

	<a href="/form" class="btn">+ Input Data Mahasiswa</a>

	<h4>Data Mahasiswa</h4>

	<table>
		<thead>
		<tr>
			<th>No</th>
			<th>Nama</th>
			<th>NIM</th>
		</tr>
		</thead>

		<tbody>
		<tr th:if="${#lists.isEmpty(data)}">
			<td colspan="3" class="empty">Belum ada data</td>
		</tr>

		<tr th:each="user, iterStat : ${data}">
			<td th:text="${iterStat.count}"></td>
			<td th:text="${user.nama}"></td>
			<td th:text="${user.nim}"></td>
		</tr>
		</tbody>
	</table>

</div>

</body>
</html>
