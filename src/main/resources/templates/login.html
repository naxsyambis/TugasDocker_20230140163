<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Segoe UI", sans-serif;
		}

		body {
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: linear-gradient(135deg, #dfeee3, #c9dfcf, #edf6ef);
			padding: 20px;
		}

		.container {
			width: 100%;
			max-width: 420px;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			padding: 40px 35px;
			box-shadow: 0 12px 35px rgba(93, 122, 102, 0.18);
			border: 1px solid rgba(174, 198, 180, 0.4);
		}

		.header {
			text-align: center;
			margin-bottom: 30px;
		}

		.header .icon {
			width: 64px;
			height: 64px;
			margin: 0 auto 16px;
			border-radius: 50%;
			background: linear-gradient(135deg, #8faa91, #b8ccb9);
			display: flex;
			justify-content: center;
			align-items: center;
			color: white;
			font-size: 28px;
			box-shadow: 0 6px 18px rgba(143, 170, 145, 0.35);
		}

		.header h2 {
			color: #4f6d57;
			font-size: 28px;
			font-weight: 700;
			margin-bottom: 8px;
		}

		.header p {
			color: #7b8f80;
			font-size: 14px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		label {
			display: block;
			margin-bottom: 8px;
			color: #5d7362;
			font-size: 14px;
			font-weight: 600;
		}

		input {
			width: 100%;
			padding: 14px 16px;
			border: 1px solid #d4e1d7;
			border-radius: 14px;
			background-color: #f7fbf8;
			font-size: 14px;
			color: #4f5f53;
			transition: all 0.25s ease;
		}

		input:focus {
			outline: none;
			border-color: #8faa91;
			background-color: #ffffff;
			box-shadow: 0 0 0 4px rgba(143, 170, 145, 0.15);
		}

		input::placeholder {
			color: #a4b3a7;
		}

		.error {
			background-color: #ffeaea;
			color: #c05b5b;
			border: 1px solid #f3caca;
			padding: 12px 14px;
			border-radius: 12px;
			margin-bottom: 20px;
			font-size: 14px;
		}

		button {
			width: 100%;
			padding: 14px;
			border: none;
			border-radius: 14px;
			background: linear-gradient(135deg, #8faa91, #6f8f75);
			color: white;
			font-size: 15px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.25s ease;
			box-shadow: 0 8px 18px rgba(111, 143, 117, 0.25);
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 12px 22px rgba(111, 143, 117, 0.35);
			background: linear-gradient(135deg, #7f9f86, #5f7d65);
		}

		button:active {
			transform: translateY(0);
		}

		.footer {
			text-align: center;
			margin-top: 22px;
			font-size: 13px;
			color: #8b9d8f;
		}
	</style>
</head>

<body>

<div class="container">
	<div class="header">
		<h2>Welcome Back</h2>
		<p>Please login to continue</p>
	</div>

	<div class="error" th:if="${error}" th:text="${error}"></div>

	<form action="/login" method="post">
		<div class="form-group">
			<label for="username">Username</label>
			<input
				type="text"
				id="username"
				name="username"
				placeholder="Enter your username"
				required>
		</div>

		<div class="form-group">
			<label for="password">Password</label>
			<input
				type="password"
				id="password"
				name="password"
				placeholder="Enter your password"
				required>
		</div>

		<button type="submit">Login</button>
	</form>

</div>

</body>
</html>
