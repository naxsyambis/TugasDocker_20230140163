<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Login</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f1f3f6;
			margin: 0;
			padding: 0;
		}

		.container {
			width: 500px;
			margin: 60px auto;
			background: #fff;
			padding: 30px;
			border-radius: 10px;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
		}

		h2 {
			margin-bottom: 20px;
		}

		label {
			font-size: 14px;
		}

		input {
			width: 100%;
			padding: 10px;
			margin: 8px 0 20px 0;
			border: 1px solid #ccc;
			border-radius: 5px;
		}

		button {
			background-color: #007bff;
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 5px;
			cursor: pointer;
		}

		button:hover {
			background-color: #0056b3;
		}

		.error {
			color: red;
			margin-bottom: 10px;
		}
	</style>
</head>

<body>

<div class="container">
	<h2>Login Page</h2>

	<!-- ERROR MESSAGE -->
	<div class="error" th:if="${error}" th:text="${error}"></div>

	<!-- FORM LOGIN -->
	<form action="/login" method="post">
		<label>Username:</label>
		<input type="text" name="username" required>

		<label>Password:</label>
		<input type="password" name="password" required>

		<button type="submit">Login</button>
	</form>
</div>

</body>
</html>
